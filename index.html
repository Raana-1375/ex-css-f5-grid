<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Background Colors - Grid Practice</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bitcount+Single&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
   <div class="screen-label label-desktop">Desktop</div>
  <div class="screen-label label-tablet">Tablet</div>
  <div class="screen-label label-phone">Phone</div>
   <main class="container">
    <header class="main-header">
      <h1>Colores de fondo</h1>
      <h2>Colores</h2>
    </header>
    <div class="color-grid">
      <div class="grid-item item-header">Colors</div>

      <div class="grid-item item-black">black</div>
      <div class="grid-item item-teal">teal</div>
      <div class="grid-item item-blue">blue</div>
      <div class="grid-item item-navy">navy</div>
      <div class="grid-item item-lime">lime</div>
      <div class="grid-item item-white">white</div>
      <div class="grid-item item-purple">purple</div>
      <div class="grid-item item-yellow">yellow</div>
      <div class="grid-item item-olive">olive</div>
      <div class="grid-item item-red">red</div>
      <div class="grid-item item-maroon">maroon</div>
      <div class="grid-item item-gray">gray</div>
      <div class="grid-item item-olivedrab">olivedrab</div>
      <div class="grid-item item-deepskyblue">deep sky blue</div>
      <div class="grid-item item-fuchsia">fuchsia</div>
      <div class="grid-item item-green">green</div>
    </div>
  </main>
 </body>
</html>
